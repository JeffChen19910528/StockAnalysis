<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>智能股票分析系統</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
/* ── 全域 ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:       #f0f4f8;
  --surface:  #ffffff;
  --surface2: #f8fafc;
  --border:   #e2e8f0;
  --primary:  #1d4ed8;
  --primary-l:#dbeafe;
  --up:       #dc2626;   /* 台股預設：紅=漲 */
  --down:     #16a34a;   /* 台股預設：綠=跌 */
  --neutral:  #6b7280;
  --text:     #1e293b;
  --text-s:   #64748b;
  --shadow:   0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
  --shadow-lg:0 4px 16px rgba(0,0,0,.12);
  --radius:   12px;
}
body {
  font-family: 'Microsoft JhengHei', '微軟正黑體', 'Yu Gothic', 'Hiragino Sans', -apple-system, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* ── Header ── */
header {
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  color: #fff;
  padding: 20px 24px 28px;
  text-align: center;
  box-shadow: var(--shadow-lg);
}
header h1 { font-size: 1.75rem; letter-spacing: .05em; margin-bottom: 4px; }
header p  { font-size: .9rem; opacity: .75; margin-bottom: 14px; }

/* ── 市場切換 ── */
.market-toggle {
  display: inline-flex;
  background: rgba(255,255,255,.12);
  border-radius: 30px;
  padding: 4px;
  gap: 4px;
}
.mkt-btn {
  padding: 7px 22px;
  border-radius: 24px;
  border: none;
  background: transparent;
  color: rgba(255,255,255,.75);
  font-size: .88rem;
  font-weight: 600;
  cursor: pointer;
  transition: all .22s;
  font-family: inherit;
}
.mkt-btn.active {
  background: #fff;
  color: #1d4ed8;
  box-shadow: 0 2px 8px rgba(0,0,0,.18);
}
.mkt-btn:not(.active):hover { color: #fff; background: rgba(255,255,255,.2); }

/* ── 語言切換 ── */
.lang-toggle {
  display: inline-flex;
  background: rgba(255,255,255,.10);
  border-radius: 20px;
  padding: 3px;
  gap: 2px;
  margin-top: 10px;
}
.lang-btn {
  padding: 4px 14px;
  border-radius: 16px;
  border: none;
  background: transparent;
  color: rgba(255,255,255,.65);
  font-size: .78rem;
  font-weight: 600;
  cursor: pointer;
  transition: all .2s;
  font-family: inherit;
  letter-spacing: .03em;
}
.lang-btn.active {
  background: rgba(255,255,255,.22);
  color: #fff;
}
.lang-btn:not(.active):hover { color: #fff; background: rgba(255,255,255,.12); }

/* ── Search ── */
.search-wrap {
  max-width: 680px;
  margin: -20px auto 0;
  padding: 0 16px;
  position: relative;
  z-index: 50;
}
.search-box {
  display: flex;
  gap: 8px;
  background: var(--surface);
  border-radius: var(--radius);
  padding: 12px 16px;
  box-shadow: var(--shadow-lg);
}
.search-box input {
  flex: 1;
  border: none;
  outline: none;
  font-size: 1rem;
  color: var(--text);
  background: transparent;
  font-family: inherit;
}
.search-box input::placeholder { color: var(--text-s); }
.btn-search {
  background: var(--primary);
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 8px 20px;
  font-size: .9rem;
  cursor: pointer;
  transition: background .2s;
  font-family: inherit;
  white-space: nowrap;
}
.btn-search:hover { background: #1e40af; }

/* 搜尋下拉 */
.dropdown {
  position: absolute;
  top: calc(100% + 4px);
  left: 16px;
  right: 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow-lg);
  max-height: 280px;
  overflow-y: auto;
  display: none;
  z-index: 100;
}
.dropdown.show { display: block; }
.drop-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 11px 16px;
  cursor: pointer;
  transition: background .15s;
  border-bottom: 1px solid var(--border);
}
.drop-item:last-child { border-bottom: none; }
.drop-item:hover { background: var(--primary-l); }
.drop-code {
  font-weight: 700;
  font-size: .95rem;
  color: var(--primary);
  min-width: 56px;
}
.drop-name { flex: 1; font-size: .9rem; }
.drop-market {
  font-size: .75rem;
  background: var(--primary-l);
  color: var(--primary);
  padding: 2px 8px;
  border-radius: 20px;
}

/* ── 主容器 ── */
main {
  max-width: 1100px;
  margin: 36px auto 40px;
  padding: 0 16px;
}

/* ── 初始提示 ── */
.hint-card {
  text-align: center;
  padding: 60px 24px;
  color: var(--text-s);
}
.hint-card .icon { font-size: 4rem; margin-bottom: 16px; }
.hint-card h2 { font-size: 1.25rem; margin-bottom: 8px; color: var(--text); }
.hint-card p  { font-size: .9rem; }

/* ── Loading ── */
.loading {
  text-align: center;
  padding: 60px;
  color: var(--text-s);
  display: none;
}
.spinner {
  width: 48px; height: 48px;
  border: 4px solid var(--border);
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin .8s linear infinite;
  margin: 0 auto 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── 卡片 ── */
.card {
  background: var(--surface);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 20px 24px;
  margin-bottom: 20px;
}
.card-title {
  font-size: .8rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .08em;
  color: var(--text-s);
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 6px;
}

/* ── 股票頭部 ── */
.stock-header {
  display: flex;
  flex-wrap: wrap;
  align-items: flex-start;
  justify-content: space-between;
  gap: 16px;
}
.stock-title h2 { font-size: 1.5rem; }
.stock-title .code { color: var(--text-s); font-size: .9rem; margin-top: 2px; }
.price-wrap { text-align: right; }
.price-main { font-size: 2.2rem; font-weight: 700; }
.price-change {
  font-size: 1rem;
  font-weight: 600;
  display: inline-flex;
  align-items: center;
  gap: 4px;
}
.up   { color: var(--up); }
.down { color: var(--down); }
.neutral { color: var(--neutral); }

/* ── 指標格 ── */
.metrics-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 12px;
  margin-top: 16px;
}
.metric-item {
  background: var(--surface2);
  border-radius: 8px;
  padding: 12px 14px;
  border: 1px solid var(--border);
}
.metric-label { font-size: .72rem; color: var(--text-s); margin-bottom: 4px; }
.metric-value { font-size: 1rem; font-weight: 700; }

/* ── 圖表 ── */
.chart-tabs {
  display: flex;
  gap: 6px;
  margin-bottom: 16px;
}
.tab-btn {
  padding: 6px 14px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--surface2);
  font-size: .8rem;
  cursor: pointer;
  transition: all .2s;
  font-family: inherit;
  color: var(--text);
}
.tab-btn.active {
  background: var(--primary);
  color: #fff;
  border-color: var(--primary);
}
.chart-container { position: relative; height: 300px; }
.chart-small     { position: relative; height: 150px; }

/* ── 股利表 ── */
.div-table { width: 100%; border-collapse: collapse; }
.div-table th, .div-table td {
  padding: 8px 12px;
  text-align: left;
  border-bottom: 1px solid var(--border);
  font-size: .88rem;
}
.div-table th {
  font-size: .75rem;
  text-transform: uppercase;
  color: var(--text-s);
  font-weight: 600;
}
.div-table tr:last-child td { border-bottom: none; }

/* ── AI 建議卡 ── */
.rec-card {
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: var(--shadow);
  margin-bottom: 20px;
}
.rec-header {
  padding: 16px 24px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.rec-header.buy    { background: linear-gradient(135deg, #dc2626, #b91c1c); color:#fff; }
.rec-header.sell   { background: linear-gradient(135deg, #16a34a, #15803d); color:#fff; }
.rec-header.watch  { background: linear-gradient(135deg, #d97706, #b45309); color:#fff; }
.rec-badge {
  font-size: 1.4rem;
  font-weight: 900;
  letter-spacing: .05em;
}
.rec-summary { font-size: .9rem; opacity: .92; }

.rec-body { background: var(--surface); padding: 20px 24px; }
.rec-section { margin-bottom: 16px; }
.rec-section:last-child { margin-bottom: 0; }
.rec-section h4 {
  font-size: .78rem;
  text-transform: uppercase;
  letter-spacing: .08em;
  color: var(--text-s);
  margin-bottom: 6px;
}
.rec-section p { font-size: .9rem; line-height: 1.7; }

/* ── 價格區間 ── */
.price-range {
  display: flex;
  gap: 12px;
  margin-top: 12px;
  flex-wrap: wrap;
}
.range-box {
  flex: 1;
  min-width: 120px;
  background: var(--surface2);
  border-radius: 8px;
  padding: 14px;
  border: 1px solid var(--border);
  text-align: center;
}
.range-box.highlight-buy  { border-color: var(--up);   background: #fef2f2; }
.range-box.highlight-sell { border-color: var(--down); background: #f0fdf4; }
.range-box.highlight-stop { border-color: #94a3b8;     background: #f8fafc; }
.range-label { font-size: .72rem; color: var(--text-s); margin-bottom: 4px; }
.range-value { font-size: 1.1rem; font-weight: 800; }
.range-value.buy-color  { color: var(--up); }
.range-value.sell-color { color: var(--down); }
.range-value.stop-color { color: var(--neutral); }

/* ── 風險提示 ── */
.risk-notice {
  font-size: .78rem;
  color: var(--text-s);
  border-top: 1px solid var(--border);
  padding-top: 12px;
  margin-top: 12px;
}

/* ── 錯誤訊息 ── */
.error-msg {
  background: #fef2f2;
  border: 1px solid #fecaca;
  border-radius: var(--radius);
  padding: 16px 20px;
  color: #b91c1c;
  display: none;
}

/* ── 2欄 Grid ── */
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
@media (max-width: 640px) {
  .two-col { grid-template-columns: 1fr; }
  .stock-header { flex-direction: column; }
  .price-wrap { text-align: left; }
}

/* ── 產業分類列 ── */
.sector-browse {
  max-width: 680px;
  margin: 10px auto 0;
  padding: 0 16px;
}
.sector-browse-box {
  background: var(--surface);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow: hidden;
}
.sector-pills-bar {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 6px;
  padding: 10px 14px;
  border-bottom: 1px solid transparent;
  transition: border-color .2s;
}
.sector-pills-bar.has-active { border-color: var(--border); }
.sector-label {
  font-size: .75rem;
  font-weight: 700;
  color: var(--text-s);
  white-space: nowrap;
  margin-right: 12px;
  flex-shrink: 0;
  letter-spacing: .04em;
}
.sector-pill {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 5px 13px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--surface2);
  font-size: .8rem;
  cursor: pointer;
  transition: all .18s;
  color: var(--text);
  font-family: inherit;
  white-space: nowrap;
  flex-shrink: 0;
}
.sector-pill:hover  { background: var(--primary-l); border-color: var(--primary); color: var(--primary); }
.sector-pill.active { background: var(--primary);   border-color: var(--primary); color: #fff; }

/* 股票清單展開面板 */
.sector-stock-panel {
  display: none;
  padding: 12px 14px;
  animation: fadeIn .18s ease;
}
.sector-stock-panel.open { display: block; }
@keyframes fadeIn { from { opacity:0; transform:translateY(-4px); } to { opacity:1; transform:none; } }
.sector-panel-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}
.sector-panel-title {
  font-size: .82rem;
  font-weight: 700;
  color: var(--text-s);
}
.sector-panel-close {
  background: none;
  border: none;
  cursor: pointer;
  color: var(--text-s);
  font-size: .85rem;
  padding: 2px 6px;
  border-radius: 4px;
  font-family: inherit;
  transition: background .15s;
}
.sector-panel-close:hover { background: var(--border); }
.sector-stocks-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(175px, 1fr));
  gap: 8px;
  max-height: 300px;
  overflow-y: auto;
  scrollbar-width: thin;
}
.sector-stock-card {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  cursor: pointer;
  transition: border-color .15s, box-shadow .15s;
}
.sector-stock-card:hover {
  border-color: var(--primary);
  box-shadow: 0 0 0 2px var(--primary-l);
}
.sector-stock-info { flex: 1; min-width: 0; }
.sector-stock-code { font-size: .82rem; font-weight: 700; color: var(--primary); }
.sector-stock-name {
  font-size: .76rem; color: var(--text-s);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.btn-analyze-sector {
  background: var(--primary); color: #fff; border: none;
  border-radius: 6px; padding: 5px 10px; font-size: .75rem;
  cursor: pointer; white-space: nowrap; font-family: inherit;
  transition: background .18s; flex-shrink: 0;
}
.btn-analyze-sector:hover { background: #1e40af; }
.sector-grid-msg {
  grid-column: 1/-1; text-align: center;
  padding: 20px; color: var(--text-s); font-size: .88rem;
}
</style>
</head>
<body>

<header>
  <h1 id="headerTitle">📈 智能股票分析系統</h1>
  <p id="headerSubtitle">輸入股票代碼或公司名稱關鍵字，取得 AI 投資建議</p>
  <div class="market-toggle">
    <button class="mkt-btn active" id="btnTW" onclick="switchMarket('tw')">🇹🇼 台股</button>
    <button class="mkt-btn" id="btnUS" onclick="switchMarket('us')">🇺🇸 美股</button>
  </div>
  <div class="lang-toggle" style="margin-top:10px">
    <button class="lang-btn active" id="langZH" onclick="setLang('zh')">繁中</button>
    <button class="lang-btn" id="langJA" onclick="setLang('ja')">日本語</button>
    <button class="lang-btn" id="langEN" onclick="setLang('en')">EN</button>
  </div>
</header>

<!-- 搜尋 -->
<div class="search-wrap">
  <div class="search-box">
    <input id="searchInput" type="text" placeholder="輸入股票代碼（如 2330）或公司名稱（如 台積電）…" autocomplete="off" />
    <button class="btn-search" onclick="triggerSearch()">分析</button>
  </div>
  <div class="dropdown" id="dropdown"></div>
</div>

<!-- 產業分類快捷列（常駐顯示） -->
<div class="sector-browse">
  <div class="sector-browse-box">
    <div class="sector-pills-bar" id="sectorPillsBar">
      <span class="sector-label">📊 產業分類</span>
      <span id="sectorLoadingText" style="font-size:.78rem;color:var(--text-s)">載入中…</span>
    </div>
    <div class="sector-stock-panel" id="sectorStockPanel">
      <div class="sector-panel-header">
        <span class="sector-panel-title" id="sectorPanelTitle"></span>
        <button class="sector-panel-close" id="sectorPanelClose" onclick="closeSectorPanel()">✕ 收起</button>
      </div>
      <div class="sector-stocks-grid" id="sectorStocksGrid"></div>
    </div>
  </div>
</div>

<main>
  <!-- 初始提示 -->
  <div class="hint-card" id="hintCard">
    <div class="icon" id="hintIcon">🔍</div>
    <h2 id="hintTitle">開始分析台股</h2>
    <p id="hintDesc">輸入上市或上櫃公司的股票代碼或名稱關鍵字，系統將自動分析技術面、基本面，並提供 AI 投資建議。</p>
  </div>

  <!-- Loading -->
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p id="loadingText">正在分析股票數據，請稍候…</p>
  </div>

  <!-- 錯誤 -->
  <div class="error-msg" id="errorMsg"></div>

  <!-- 結果區 -->
  <div id="result" style="display:none">

    <!-- 股票標題 -->
    <div class="card">
      <div class="stock-header">
        <div class="stock-title">
          <h2 id="stockName">—</h2>
          <div class="code" id="stockCode">—</div>
        </div>
        <div class="price-wrap">
          <div class="price-main" id="currentPrice">—</div>
          <div class="price-change" id="priceChange">—</div>
        </div>
      </div>
      <div class="metrics-grid" id="metricsGrid"></div>
    </div>

    <!-- AI 投資建議 -->
    <div class="rec-card" id="recCard">
      <div class="rec-header" id="recHeader">
        <div>
          <div class="rec-badge" id="recAction">—</div>
          <div class="rec-summary" id="recSummary">—</div>
        </div>
      </div>
      <div class="rec-body">
        <div class="price-range" id="priceRange"></div>
        <div style="height:12px"></div>
        <div class="rec-section">
          <h4>📊 技術面分析</h4>
          <p id="recTech">—</p>
        </div>
        <div class="rec-section">
          <h4>💰 基本面分析</h4>
          <p id="recFund">—</p>
        </div>
        <div class="rec-section">
          <h4>🎯 操作建議</h4>
          <p id="recOp">—</p>
        </div>
        <div class="risk-notice" id="riskNotice"></div>
      </div>
    </div>

    <!-- 價格圖 -->
    <div class="card">
      <div class="card-title" data-i18n="priceChart">📉 股價走勢</div>
      <div class="chart-tabs">
        <button class="tab-btn active" onclick="switchChart('price',this)">K 線 + 均線</button>
        <button class="tab-btn" onclick="switchChart('bb',this)">布林通道</button>
      </div>
      <div class="chart-container">
        <canvas id="priceChart"></canvas>
      </div>
    </div>

    <!-- RSI + MACD -->
    <div class="two-col">
      <div class="card">
        <div class="card-title">RSI (14)</div>
        <div class="chart-small"><canvas id="rsiChart"></canvas></div>
      </div>
      <div class="card">
        <div class="card-title">MACD (12,26,9)</div>
        <div class="chart-small"><canvas id="macdChart"></canvas></div>
      </div>
    </div>

    <!-- 成交量 -->
    <div class="card">
      <div class="card-title" data-i18n="volChart">📦 成交量</div>
      <div class="chart-small"><canvas id="volChart"></canvas></div>
    </div>

    <!-- 股利紀錄 -->
    <div class="card" id="divCard" style="display:none">
      <div class="card-title" data-i18n="divCard">💵 近期股利紀錄</div>
      <table class="div-table">
        <thead><tr><th id="divDateHeader">除息日</th><th id="divAmtHeader">股利（元）</th></tr></thead>
        <tbody id="divBody"></tbody>
      </table>
    </div>

  </div><!-- /result -->
</main>

<script>
// ────────── 多語言 ──────────
const LANGS = {
  zh: {
    title: '智能股票分析系統',
    subtitle: '輸入股票代碼或公司名稱關鍵字，取得 AI 投資建議',
    btnTW: '🇹🇼 台股', btnUS: '🇺🇸 美股', btnAnalyze: '分析',
    sectorLabel: '📊 產業分類',
    analyzing: '正在分析股票數據，請稍候…',
    hintTitleTW: '開始分析台股',
    hintDescTW: '輸入上市或上櫃公司的股票代碼或名稱關鍵字，系統將自動分析技術面、基本面，並提供 AI 投資建議。',
    hintTitleUS: '開始分析美股',

let currentLang = 'zh';
function t(key) { return (LANGS[currentLang] || LANGS.zh)[key] || key; }

function setLang(lang) {
  currentLang = lang;
  ['ZH','JA','EN'].forEach(l =>
    document.getElementById('lang' + l).classList.toggle('active', l.toLowerCase() === lang)
  );
  document.documentElement.lang = lang === 'zh' ? 'zh-Hant' : lang === 'ja' ? 'ja' : 'en';
  applyLang();
}

function applyLang() {
  document.title = t('title');
  document.getElementById('headerTitle').textContent = '📈 ' + t('title');
  document.getElementById('headerSubtitle').textContent = t('subtitle');
  document.getElementById('btnTW').textContent = t('btnTW');
  document.getElementById('btnUS').textContent = t('btnUS');
  document.querySelector('.btn-search').textContent = t('btnAnalyze');
  document.getElementById('loadingText').textContent = t('analyzing');

  const market = currentMarket || 'tw';
  document.getElementById('hintTitle').textContent = market === 'us' ? t('hintTitleUS') : t('hintTitleTW');
  document.getElementById('hintDesc').textContent  = market === 'us' ? t('hintDescUS')  : t('hintDescTW');
  document.getElementById('searchInput').placeholder = market === 'us' ? t('placeholderUS') : t('placeholderTW');

  const sectorLabelEl = document.querySelector('.sector-label');
  if (sectorLabelEl) sectorLabelEl.textContent = t('sectorLabel');
  const sectorLoadingEl = document.getElementById('sectorLoadingText');
  if (sectorLoadingEl) sectorLoadingEl.textContent = t('loadingData');

  const recSections = document.querySelectorAll('.rec-section h4');
  if (recSections[0]) recSections[0].textContent = t('techAnalysis');
  if (recSections[1]) recSections[1].textContent = t('fundAnalysis');
  if (recSections[2]) recSections[2].textContent = t('opAnalysis');

  const tabBtns = document.querySelectorAll('.tab-btn');
  if (tabBtns[0]) tabBtns[0].textContent = t('klineTab');
  if (tabBtns[1]) tabBtns[1].textContent = t('bbTab');

  const cardTitles = document.querySelectorAll('.card-title');
  cardTitles.forEach(el => {
    const id = el.dataset.i18n;
    if (id) el.textContent = t(id);
  });

  const closePanelBtn = document.getElementById('sectorPanelClose');
  if (closePanelBtn) closePanelBtn.textContent = t('sectorClose');

  const divDateTh = document.getElementById('divDateHeader');
  if (divDateTh) divDateTh.textContent = t('divDate');
}

// ────────── 全域狀態 ──────────
let chartPrice = null, chartRsi = null, chartMacd = null, chartVol = null;
let currentChartMode = 'price';
let globalChartData = [];
let currentMarket = 'tw';  // 'tw' | 'us'

// ────────── 市場切換 ──────────
function switchMarket(market) {
  currentMarket = market;

  document.getElementById('btnTW').classList.toggle('active', market === 'tw');
  document.getElementById('btnUS').classList.toggle('active', market === 'us');

  const root = document.documentElement;
  if (market === 'us') {
    root.style.setProperty('--up',   '#16a34a');
    root.style.setProperty('--down', '#dc2626');
  } else {
    root.style.setProperty('--up',   '#dc2626');
    root.style.setProperty('--down', '#16a34a');
  }
  document.getElementById('hintIcon').textContent = '🔍';
  applyLang();

  // 清除搜尋框與結果
  document.getElementById('searchInput').value = '';
  dropdown.classList.remove('show');
  document.getElementById('result').style.display   = 'none';
  document.getElementById('errorMsg').style.display = 'none';
  document.getElementById('hintCard').style.display = 'block';
}

// ────────── 搜尋下拉 ──────────
const input    = document.getElementById('searchInput');
const dropdown = document.getElementById('dropdown');
let debounceTimer;

input.addEventListener('input', () => {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(fetchSuggestions, 300);
});

input.addEventListener('keydown', e => {
  if (e.key === 'Enter') triggerSearch();
});

document.addEventListener('click', e => {
  if (!e.target.closest('.search-wrap')) dropdown.classList.remove('show');
});

async function fetchSuggestions() {
  const q = input.value.trim();
  if (!q) { dropdown.classList.remove('show'); return; }

  const endpoint = currentMarket === 'us' ? '/api/search_us' : '/api/search';
  try {
    const res = await fetch(`${endpoint}?q=${encodeURIComponent(q)}`);
    const json = await res.json();
    renderDropdown(json.results || []);
  } catch(e) { dropdown.classList.remove('show'); }
}

function renderDropdown(items) {
  if (!items.length) { dropdown.classList.remove('show'); return; }
  dropdown.innerHTML = items.map(s => `
    <div class="drop-item" onclick="selectStock('${escHtml(s.ticker)}','${escHtml(s.name)}','${escHtml(s.code)}')">
      <span class="drop-code">${s.code}</span>
      <span class="drop-name">${escHtml(s.name)}</span>
      <span class="drop-market">${s.market}</span>
    </div>`).join('');
  dropdown.classList.add('show');
}

function selectStock(ticker, name, code) {
  input.value = `${code} ${name}`;
  dropdown.classList.remove('show');
  analyzeStock(ticker, name);
}

function triggerSearch() {
  const q = input.value.trim();
  if (!q) return;
  if (currentMarket === 'tw' && /^\d{4,6}$/.test(q)) {
    analyzeStock(`${q}.TW`, q);
  } else if (currentMarket === 'us' && /^[A-Za-z]{1,5}$/.test(q)) {
    analyzeStock(q.toUpperCase(), q.toUpperCase());
  } else {
    fetchSuggestions();
  }
}

// ────────── 分析主流程 ──────────
async function analyzeStock(ticker, name) {
  dropdown.classList.remove('show');
  setLoading(true);

  try {
    const url = `/api/analyze?ticker=${encodeURIComponent(ticker)}&name=${encodeURIComponent(name || ticker)}&market=${currentMarket}`;
    const res  = await fetch(url);
    const data = await res.json();

    if (!res.ok) {
      showError(data.error || t('errAnalyze'));
      return;
    }
    renderResult(data);
  } catch(e) {
    showError(t('errNetwork'));
  } finally {
    setLoading(false);
  }
}

// ────────── 渲染結果 ──────────
function renderResult(d) {
  document.getElementById('hintCard').style.display = 'none';
  document.getElementById('errorMsg').style.display  = 'none';
  document.getElementById('result').style.display    = 'block';

  const isUS = d.market_type === 'us';
  const currencyPrefix = isUS ? '$' : 'NT$';
  const currencyUnit   = isUS ? 'USD' : '元';

  // 標題
  document.getElementById('stockName').textContent = d.name || d.ticker;
  document.getElementById('stockCode').textContent = `${d.ticker} · ${d.market_cap ? fmtCap(d.market_cap, isUS) : ''}`;

  // 現價
  const priceEl = document.getElementById('currentPrice');
  priceEl.textContent = `${currencyPrefix}${d.current_price}`;
  priceEl.className = 'price-main ' + (d.price_change > 0 ? 'up' : d.price_change < 0 ? 'down' : 'neutral');

  const changeEl = document.getElementById('priceChange');
  const sign = d.price_change > 0 ? '▲' : d.price_change < 0 ? '▼' : '—';
  changeEl.textContent = `${sign} ${Math.abs(d.price_change)} (${d.price_change_pct > 0 ? '+' : ''}${d.price_change_pct}%)`;
  changeEl.className = 'price-change ' + (d.price_change > 0 ? 'up' : d.price_change < 0 ? 'down' : 'neutral');

  // 指標格
  const metrics = [
    { label: 'RSI (14)',         value: fmtNum(d.rsi, 1),       cls: rsiClass(d.rsi) },
    { label: 'MA5',              value: `${fmtNum(d.ma5, 2)} ${currencyUnit}` },
    { label: 'MA20',             value: `${fmtNum(d.ma20, 2)} ${currencyUnit}` },
    { label: 'MA60',             value: `${fmtNum(d.ma60, 2)} ${currencyUnit}` },
    { label: t('support'),       value: `${fmtNum(d.support, 2)} ${currencyUnit}` },
    { label: t('resistance'),    value: `${fmtNum(d.resistance, 2)} ${currencyUnit}` },
    { label: t('pe'),            value: fmtNum(d.pe_ratio, 1) || 'N/A' },
    { label: t('divYield'),      value: d.div_yield != null ? d.div_yield + '%' : 'N/A' },
    { label: 'ROE',              value: d.roe != null ? d.roe + '%' : 'N/A' },
    { label: t('volume'),        value: fmtVol(d.vol_today) },
  ];
  document.getElementById('metricsGrid').innerHTML = metrics.map(m => `
    <div class="metric-item">
      <div class="metric-label">${m.label}</div>
      <div class="metric-value ${m.cls || ''}">${m.value}</div>
    </div>`).join('');

  // AI 建議
  renderRecommendation(d.recommendation, currencyPrefix);

  // 圖表
  globalChartData = d.chart_data || [];
  currentChartMode = 'price';
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-btn')[0].classList.add('active');
  buildPriceChart(globalChartData, currencyUnit);
  buildRsiChart(globalChartData);
  buildMacdChart(globalChartData);
  buildVolChart(globalChartData);

  // 股利
  const divUnit = isUS ? 'USD' : '元';
  document.getElementById('divAmtHeader').textContent = `${t('divAmt')}（${divUnit}）`;
  if (d.div_history && d.div_history.length) {
    document.getElementById('divCard').style.display = 'block';
    document.getElementById('divBody').innerHTML = d.div_history.slice().reverse().map(item =>
      `<tr><td>${item.date}</td><td><strong>${item.amount}</strong> ${divUnit}</td></tr>`
    ).join('');
  } else {
    document.getElementById('divCard').style.display = 'none';
  }
}

function renderRecommendation(rec, currencyPrefix) {
  if (!rec) return;
  const header = document.getElementById('recHeader');
  const action = rec.action || '觀望';
  const actionKey = action === '買進' ? 'buy' : action === '賣出' ? 'sell' : 'watch';

  header.className = 'rec-header ' + actionKey;
  document.getElementById('recAction').textContent  = `【${t(actionKey)}】`;
  document.getElementById('recSummary').textContent = rec.summary || '';
  document.getElementById('recTech').textContent    = rec.technical_analysis || '';
  document.getElementById('recFund').textContent    = rec.fundamental_analysis || '';
  document.getElementById('recOp').textContent      = rec.recommendation || '';
  document.getElementById('riskNotice').textContent = '⚠️ ' + (rec.risk_warning || t('riskDefault'));

  const priceRange = document.getElementById('priceRange');
  let rangeHTML = '';

  if (action === '買進') {
    if (rec.buy_low != null)   rangeHTML += rangeBox(t('buyLow'),   `${currencyPrefix}${rec.buy_low}`,   'highlight-buy',  'buy-color');
    if (rec.buy_high != null)  rangeHTML += rangeBox(t('buyHigh'),  `${currencyPrefix}${rec.buy_high}`,  'highlight-buy',  'buy-color');
    if (rec.stop_loss != null) rangeHTML += rangeBox(t('stopLoss'), `${currencyPrefix}${rec.stop_loss}`, 'highlight-stop', 'stop-color');
  } else if (action === '賣出') {
    if (rec.sell_low != null)    rangeHTML += rangeBox(t('sellLow'),    `${currencyPrefix}${rec.sell_low}`,    'highlight-sell', 'sell-color');
    if (rec.sell_high != null)   rangeHTML += rangeBox(t('sellHigh'),   `${currencyPrefix}${rec.sell_high}`,   'highlight-sell', 'sell-color');
    if (rec.take_profit != null) rangeHTML += rangeBox(t('takeProfit'), `${currencyPrefix}${rec.take_profit}`, 'highlight-stop', 'stop-color');
  } else if (rec.wait_condition) {
    rangeHTML += `<div style="font-size:.9rem;padding:12px;background:#fffbeb;border:1px solid #fcd34d;border-radius:8px;flex:1">
      ⏳ <strong>${t('waitCond')}</strong>${rec.wait_condition}</div>`;
  }

  priceRange.innerHTML = rangeHTML;
}

function rangeBox(label, value, boxCls, valCls) {
  return `<div class="range-box ${boxCls}">
    <div class="range-label">${label}</div>
    <div class="range-value ${valCls}">${value}</div>
  </div>`;
}

// ────────── 圖表建構 ──────────
function switchChart(mode, btn) {
  currentChartMode = mode;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  buildPriceChart(globalChartData);
}

function buildPriceChart(data, yUnit) {
  if (chartPrice) chartPrice.destroy();
  const labels = data.map(d => d.date);
  const close  = data.map(d => d.close);
  const ma5    = data.map(d => d.ma5);
  const ma20   = data.map(d => d.ma20);
  const ma60   = data.map(d => d.ma60);
  const bbUp   = data.map(d => d.bb_upper);
  const bbLo   = data.map(d => d.bb_lower);

  const datasets = [
    lineDs(t('closingPrice'), close, '#1d4ed8', 2, false),
    lineDs('MA5',  ma5,  '#f59e0b', 1, false),
    lineDs('MA20', ma20, '#8b5cf6', 1, false),
    lineDs('MA60', ma60, '#06b6d4', 1, false),
  ];

  if (currentChartMode === 'bb') {
    datasets.push(lineDs(t('bbUpper'), bbUp, '#dc2626', 1, true));
    datasets.push(lineDs(t('bbLower'), bbLo, '#16a34a', 1, true));
  }

  chartPrice = new Chart(document.getElementById('priceChart').getContext('2d'), {
    type: 'line',
    data: { labels, datasets },
    options: chartOpts(yUnit || '', true)
  });
}

function buildRsiChart(data) {
  if (chartRsi) chartRsi.destroy();
  const labels = data.map(d => d.date);
  const rsi    = data.map(d => d.rsi);
  const ob     = data.map(() => 70);
  const os     = data.map(() => 30);

  chartRsi = new Chart(document.getElementById('rsiChart').getContext('2d'), {
    type: 'line',
    data: { labels, datasets: [
      lineDs('RSI', rsi, '#8b5cf6', 1.5, false),
      lineDs(t('overbought'), ob, '#dc262640', .8, true),
      lineDs(t('oversold'),   os, '#16a34a40', .8, true),
    ]},
    options: { ...chartOpts('', false), scales: { x: hiddenX(), y: { min:0, max:100, grid:{color:'#e2e8f010'}, ticks:{color:'#64748b', font:{size:10}} } } }
  });
}

function buildMacdChart(data) {
  if (chartMacd) chartMacd.destroy();
  const labels = data.map(d => d.date);
  const macd   = data.map(d => d.macd);
  const sig    = data.map(d => d.signal);
  const histo  = data.map(d => d.histo);

  chartMacd = new Chart(document.getElementById('macdChart').getContext('2d'), {
    type: 'bar',
    data: { labels, datasets: [
      { label: 'Histogram', data: histo, backgroundColor: histo.map(v => v > 0 ? '#dc262666' : '#16a34a66'), borderWidth: 0, order: 2 },
      { label: 'MACD',   data: macd, borderColor: '#1d4ed8', backgroundColor: 'transparent', type: 'line', borderWidth: 1.5, pointRadius: 0, order: 1 },
      { label: 'Signal', data: sig,  borderColor: '#f59e0b', backgroundColor: 'transparent', type: 'line', borderWidth: 1.5, pointRadius: 0, order: 1 },
    ]},
    options: { ...chartOpts('', false), scales: { x: hiddenX(), y: { grid:{color:'#e2e8f010'}, ticks:{color:'#64748b', font:{size:10}} } } }
  });
}

function buildVolChart(data) {
  if (chartVol) chartVol.destroy();
  const labels = data.map(d => d.date);
  const vols   = data.map(d => d.volume);
  const colors = data.map((d, i) => {
    if (i === 0) return '#94a3b8';
    return d.close >= data[i-1].close ? getComputedStyle(document.documentElement).getPropertyValue('--up').trim() + 'aa'
                                       : getComputedStyle(document.documentElement).getPropertyValue('--down').trim() + 'aa';
  });

  chartVol = new Chart(document.getElementById('volChart').getContext('2d'), {
    type: 'bar',
    data: { labels, datasets: [{ label: t('volume'), data: vols, backgroundColor: colors, borderWidth: 0 }] },
    options: { ...chartOpts('', false), scales: { x: hiddenX(), y: { grid:{color:'#e2e8f010'}, ticks:{color:'#64748b', font:{size:10}, callback: v => fmtVol(v)} } } }
  });
}

function lineDs(label, data, color, width, dashed) {
  return {
    label, data,
    borderColor: color,
    backgroundColor: 'transparent',
    borderWidth: width,
    borderDash: dashed ? [4,3] : [],
    pointRadius: 0,
    tension: 0.1,
  };
}

function chartOpts(yUnit, legend) {
  return {
    responsive: true, maintainAspectRatio: false,
    animation: { duration: 400 },
    interaction: { mode: 'index', intersect: false },
    plugins: {
      legend: { display: legend, labels: { color: '#64748b', font:{size:11}, boxWidth:16, padding:12 } },
      tooltip: {
        callbacks: {
          label: ctx => `${ctx.dataset.label}: ${ctx.parsed.y != null ? ctx.parsed.y.toFixed(2) : 'N/A'}${yUnit}`
        }
      }
    },
    scales: {
      x: {
        ticks: { color: '#64748b', maxTicksLimit: 8, font:{size:10} },
        grid:  { color: '#e2e8f015' }
      },
      y: {
        ticks: { color: '#64748b', font:{size:10} },
        grid:  { color: '#e2e8f015' }
      }
    }
  };
}

function hiddenX() {
  return { display: false };
}

// ────────── 工具函式 ──────────
function setLoading(show) {
  document.getElementById('loading').style.display = show ? 'block' : 'none';
  if (show) {
    document.getElementById('result').style.display  = 'none';
    document.getElementById('errorMsg').style.display = 'none';
  }
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = `❌ ${msg}`;
  el.style.display = 'block';
  document.getElementById('result').style.display = 'none';
}

function fmtNum(v, dec=2) {
  if (v == null) return 'N/A';
  return Number(v).toFixed(dec);
}

function fmtVol(v) {
  if (v == null) return 'N/A';
  if (v >= 1e9) return (v/1e9).toFixed(1) + 'B';
  if (v >= 1e6) return (v/1e6).toFixed(1) + 'M';
  if (v >= 1e4) return (v/1e4).toFixed(1) + t('tenThousand');
  return v.toString();
}

function fmtCap(v, isUS) {
  if (!v) return '';
  const mc = t('marketCap');
  if (isUS) {
    if (v >= 1e12) return `${mc} $${(v/1e12).toFixed(2)}T`;
    if (v >= 1e9)  return `${mc} $${(v/1e9).toFixed(1)}B`;
    return '';
  }
  if (v >= 1e12) return `${mc} ${(v/1e12).toFixed(1)} 兆`;
  if (v >= 1e8)  return `${mc} ${(v/1e8).toFixed(0)} 億`;
  return '';
}

function rsiClass(v) {
  if (v == null) return '';
  if (v < 30) return 'down';
  if (v > 70) return 'up';
  return '';
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ────────── 產業分類 ──────────
let activeSector = null;

// 頁面載入後自動拉取產業列表
window.addEventListener('DOMContentLoaded', () => { applyLang(); loadSectorPills(); });

async function loadSectorPills() {
  const bar = document.getElementById('sectorPillsBar');
  try {
    const res  = await fetch(`/api/sectors?market=${currentMarket}`);
    const json = await res.json();
    renderSectorPills(json.sectors || []);
  } catch(e) {
    bar.innerHTML = `<span class="sector-label">${t('sectorLabel')}</span><span style="font-size:.78rem;color:var(--text-s)">${t('loadFail')}</span>`;
  }
}

function renderSectorPills(sectors) {
  const bar = document.getElementById('sectorPillsBar');
  bar.innerHTML = `<span class="sector-label">${t('sectorLabel')}</span>` +
    sectors.map(s =>
      `<button class="sector-pill" onclick="selectSector('${escHtml(s)}')">${escHtml(s)}</button>`
    ).join('');
}

async function selectSector(sector) {
  // 同一個 pill 再點一次 → 收起
  if (activeSector === sector) { closeSectorPanel(); return; }
  activeSector = sector;

  document.querySelectorAll('.sector-pill').forEach(b =>
    b.classList.toggle('active', b.textContent === sector)
  );
  document.getElementById('sectorPillsBar').classList.add('has-active');
  document.getElementById('sectorPanelTitle').textContent = `${sector}${t('sectorSuffix')}`;

  const panel = document.getElementById('sectorStockPanel');
  panel.classList.add('open');

  const grid = document.getElementById('sectorStocksGrid');
  grid.innerHTML = `<div class="sector-grid-msg">${t('loadingData')}</div>`;

  try {
    const res  = await fetch(`/api/sector_stocks?market=${currentMarket}&sector=${encodeURIComponent(sector)}`);
    const json = await res.json();
    renderSectorStocks(json.results || []);
  } catch(e) {
    grid.innerHTML = `<div class="sector-grid-msg">${t('loadStockFail')}</div>`;
  }
}

function closeSectorPanel() {
  activeSector = null;
  document.querySelectorAll('.sector-pill').forEach(b => b.classList.remove('active'));
  document.getElementById('sectorPillsBar').classList.remove('has-active');
  document.getElementById('sectorStockPanel').classList.remove('open');
}

function renderSectorStocks(stocks) {
  const grid = document.getElementById('sectorStocksGrid');
  if (!stocks.length) {
    grid.innerHTML = `<div class="sector-grid-msg">${t('noData')}</div>`;
    return;
  }
  grid.innerHTML = stocks.map(s => `
    <div class="sector-stock-card" onclick="sectorAnalyze('${escHtml(s.ticker)}','${escHtml(s.name)}')">
      <div class="sector-stock-info">
        <div class="sector-stock-code">${escHtml(s.code)}</div>
        <div class="sector-stock-name" title="${escHtml(s.name)}">${escHtml(s.name)}</div>
      </div>
      <button class="btn-analyze-sector">${t('sectorAnalyze')}</button>
    </div>`).join('');
}

function sectorAnalyze(ticker, name) {
  document.getElementById('searchInput').value = `${ticker.replace(/\.(TW|TWO)$/, '')} ${name}`;
  closeSectorPanel();
  analyzeStock(ticker, name);
}

// 切換市場時重置並重新載入產業 pills
const _origSwitchMarket = switchMarket;
switchMarket = function(market) {
  _origSwitchMarket(market);
  closeSectorPanel();
  loadSectorPills();
};
</script>
